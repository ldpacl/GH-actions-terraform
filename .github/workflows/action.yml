name: "Terraform Workflow with GitHub Actions"

on:
  pull_request:
    branches:
    - main
    paths:
    - terraform/**

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  BUCKET_TF_STATE: ${{ secrets.BUCKET_TF_STATE }}
  AWS_REGION: us-east-1

jobs:
  terraform:
    name: "Terraform Workflow"
    runs-on: ubuntu-latest
    defaults: 
      run:
        shell: bash
        working-directory: ./terraform

    steps:
      - name: Checkout the repo to the runner
        uses: actions/checkout@v4

      - name: Setup Terraform with latest version
        uses: hashicorp/setup-terraform@v4

      - name: Terraform init
        id: init 
        run: terraform init -backend-config="bucket=$BUCKET_TF_STATE"

      - name: Terraform format
        id: format
        run: terraform fmt -check

      - name: Terraform validate
        id: validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color -input=false
        continue-on-error: true

      - uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN: "terraform\n${{ steps.plan.outputs.stdout }}"
          FORMAT_OUTCOME: ${{ steps.format.outcome }}
          INIT_OUTCOME: ${{ steps.init.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
        with:
          script: |
            const output = `#### Terraform Format and Style \`${process.env.FORMAT_OUTCOME}\`
            #### Terraform Initialization \`${process.env.INIT_OUTCOME}\`
            #### Terraform Validation \`${process.env.VALIDATE_OUTCOME}\`
            #### Terraform Plan \`${process.env.PLAN_OUTCOME}\`

            <details><summary>Terraform Plan</summary>

            \`\`\`
            ${process.env.PLAN}
            \`\`\`

            </details>
            *Pushed by: @${process.env.GITHUB_ACTOR}, Action: \`${process.env.GITHUB_EVENT_NAME}\`*`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false
