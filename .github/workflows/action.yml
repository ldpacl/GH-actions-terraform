name: "Terraform Workflow with GitHub Actions"

on:
  pull_request:
    branches:
      - main
    paths:
      - terraform/**
  push:
    branches:
      - main
    paths:
      - terraform/**

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  TF_LOG: INFO
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  BUCKET_TF_STATE: ${{ secrets.BUCKET_TF_STATE }}
  AWS_REGION: us-east-1

jobs:
  terraform:
    name: "Terraform Workflow"
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./terraform

    steps:
      - name: Checkout the repo to the runner
        uses: actions/checkout@v4

      - name: Setup Terraform with latest version
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform init
        id: init
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: |
          set -o pipefail
          mkdir -p "$GITHUB_WORKSPACE/.ci-logs"
          LOG_FILE="$GITHUB_WORKSPACE/.ci-logs/init.log"
          terraform init -backend-config="bucket=$BUCKET_TF_STATE" 2>&1 | tee "$LOG_FILE"
          EXIT=${PIPESTATUS[0]}
          if [ "$(stat -c%s "$LOG_FILE")" -gt 12000 ]; then
            printf '%s\n' "... (log truncated, showing last 10KB) ..." >"${LOG_FILE}.new"
            tail -c 10000 "$LOG_FILE" >>"${LOG_FILE}.new"
            mv "${LOG_FILE}.new" "$LOG_FILE"
          fi
          exit "$EXIT"

      - name: Terraform format
        id: format
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: |
          set -o pipefail
          mkdir -p "$GITHUB_WORKSPACE/.ci-logs"
          LOG_FILE="$GITHUB_WORKSPACE/.ci-logs/format.log"
          # -diff lists needed edits; filenames appear in the diff / list output
          terraform fmt -check -diff -recursive 2>&1 | tee "$LOG_FILE"
          EXIT=${PIPESTATUS[0]}
          if [ "$(stat -c%s "$LOG_FILE")" -gt 12000 ]; then
            printf '%s\n' "... (log truncated, showing last 10KB) ..." >"${LOG_FILE}.new"
            tail -c 10000 "$LOG_FILE" >>"${LOG_FILE}.new"
            mv "${LOG_FILE}.new" "$LOG_FILE"
          fi
          exit "$EXIT"

      - name: Terraform validate
        id: validate
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: |
          set -o pipefail
          mkdir -p "$GITHUB_WORKSPACE/.ci-logs"
          LOG_FILE="$GITHUB_WORKSPACE/.ci-logs/validate.log"
          terraform validate 2>&1 | tee "$LOG_FILE"
          EXIT=${PIPESTATUS[0]}
          if [ "$(stat -c%s "$LOG_FILE")" -gt 12000 ]; then
            printf '%s\n' "... (log truncated, showing last 10KB) ..." >"${LOG_FILE}.new"
            tail -c 10000 "$LOG_FILE" >>"${LOG_FILE}.new"
            mv "${LOG_FILE}.new" "$LOG_FILE"
          fi
          exit "$EXIT"

      - name: Terraform plan
        id: plan
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          set -o pipefail
          mkdir -p "$GITHUB_WORKSPACE/.ci-logs"
          LOG_FILE="$GITHUB_WORKSPACE/.ci-logs/plan.log"
          terraform plan -no-color -input=false 2>&1 | tee "$LOG_FILE"
          EXIT=${PIPESTATUS[0]}
          if [ "$(stat -c%s "$LOG_FILE")" -gt 12000 ]; then
            printf '%s\n' "... (log truncated, showing last 10KB) ..." >"${LOG_FILE}.new"
            tail -c 10000 "$LOG_FILE" >>"${LOG_FILE}.new"
            mv "${LOG_FILE}.new" "$LOG_FILE"
          fi
          exit "$EXIT"

      - uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        env:
          INIT_OUTCOME: ${{ steps.init.outcome }}
          FORMAT_OUTCOME: ${{ steps.format.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const marker = '<!-- gh-actions-terraform-ci-report -->';

            function readLog(name) {
              const p = path.join(process.env.GITHUB_WORKSPACE, '.ci-logs', `${name}.log`);
              try {
                const text = fs.readFileSync(p, 'utf8');
                return text.trim().length ? text : '_Log file was empty._';
              } catch (e) {
                return `_No log file (step may have been skipped or not run yet): \`${p}\`._`;
              }
            }

            function escFence(s) {
              // Break accidental ``` sequences so they do not terminate the markdown fence.
              return String(s || '_No output captured._').replace(/```/g, '`\u200b``');
            }

            function section(title, outcome, log) {
              const icon =
                outcome === 'success'
                  ? '✅'
                  : outcome === 'failure'
                    ? '❌'
                    : outcome === 'skipped'
                      ? '⏭️'
                      : '❔';
              const reason =
                outcome === 'failure'
                  ? 'This step failed; see output below for the Terraform message.'
                  : outcome === 'skipped'
                    ? 'This step did not run for this event.'
                    : 'Completed without errors (exit code 0).';
              return [
                `### ${icon} ${title}`,
                '',
                `**Result:** \`${outcome}\` — ${reason}`,
                '',
                '<details><summary>Command output</summary>',
                '',
                '```text',
                escFence(log),
                '```',
                '',
                '</details>',
              ].join('\n');
            }

            const outcomes = [
              process.env.INIT_OUTCOME,
              process.env.FORMAT_OUTCOME,
              process.env.VALIDATE_OUTCOME,
              process.env.PLAN_OUTCOME,
            ];
            const summaryLine = outcomes.some((o) => o === 'failure')
              ? '**Overall:** at least one check failed. Fix the issues below before merging.'
              : '**Overall:** all executed checks passed.';

            const body = [
              marker,
              '## Terraform CI report',
              '',
              summaryLine,
              '',
              section('Terraform init', process.env.INIT_OUTCOME, readLog('init')),
              '',
              section('Terraform format (`fmt -check -diff`)', process.env.FORMAT_OUTCOME, readLog('format')),
              '',
              section('Terraform validate', process.env.VALIDATE_OUTCOME, readLog('validate')),
              '',
              section('Terraform plan', process.env.PLAN_OUTCOME, readLog('plan')),
              '',
              `*Workflow: \`${process.env.GITHUB_RUN_ID}\` · Actor: @${process.env.GITHUB_ACTOR}*`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find((c) => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail PR if any Terraform check failed
        if: >-
          always() &&
          github.event_name == 'pull_request' &&
          (steps.init.outcome == 'failure' ||
           steps.format.outcome == 'failure' ||
           steps.validate.outcome == 'failure' ||
           steps.plan.outcome == 'failure')
        run: exit 1

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false
