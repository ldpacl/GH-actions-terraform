name: "Terraform Workflow with GitHub Actions"

on:
  pull_request:
    branches:
      - main
    paths:
      - terraform/**

  push:
    branches:
      - main
    paths:
      - terraform/**

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  TF_LOG: INFO
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  BUCKET_TF_STATE: ${{ secrets.BUCKET_TF_STATE }}
  AWS_REGION: us-east-1

jobs:
  terraform:
    name: "Terraform Workflow"
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./terraform

    steps:
      - name: Checkout the repo to the runner
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - name: Detect secrets
        id: detect_secrets
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        working-directory: .
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/.ci-logs"
          LOG_FILE="$GITHUB_WORKSPACE/.ci-logs/detect-secrets.log"
          : > "$LOG_FILE"
          python3 -m pip install --user --upgrade pip >>"$LOG_FILE" 2>&1
          pip install --user "detect-secrets>=1.5.0" >>"$LOG_FILE" 2>&1
          export PATH="$HOME/.local/bin:$PATH"
          set +e
          detect-secrets scan --all-files \
            --exclude-files '.git/**' \
            --exclude-files '.terraform/**' \
            --exclude-files '.ci-logs/**' \
            --exclude-files '*.tfstate*' \
            . > /tmp/secrets.json 2> /tmp/secrets.err
          SCAN_EXIT=$?
          set -e
          {
            echo "=== detect-secrets exit code ==="
            echo "$SCAN_EXIT"
            echo "=== detect-secrets stderr ==="
            cat /tmp/secrets.err
            echo "=== scan JSON (first 400 lines) ==="
            set +o pipefail
            jq . /tmp/secrets.json | head -n 400 || true
            set -o pipefail
          } >>"$LOG_FILE" 2>&1
          if [ "$SCAN_EXIT" -ne 0 ]; then
            echo "::error::detect-secrets scan command failed (exit $SCAN_EXIT)." >>"$LOG_FILE"
            exit "$SCAN_EXIT"
          fi
          COUNT="$(jq '.results | keys | length' /tmp/secrets.json)"
          echo "Finding count: $COUNT" >>"$LOG_FILE"
          if [ "${COUNT:-0}" -ne 0 ]; then
            echo "::error::detect-secrets reported $COUNT finding(s). Remove secrets or add a reviewed baseline, then re-run."
            exit 1
          fi

      - name: Setup Terraform with latest version
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform init
        id: init
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: |
          set -o pipefail
          mkdir -p "$GITHUB_WORKSPACE/.ci-logs"
          LOG_FILE="$GITHUB_WORKSPACE/.ci-logs/init.log"
          terraform init -backend-config="bucket=$BUCKET_TF_STATE" 2>&1 | tee "$LOG_FILE"
          EXIT=${PIPESTATUS[0]}
          if [ "$(stat -c%s "$LOG_FILE")" -gt 12000 ]; then
            printf '%s\n' "... (log truncated, showing last 10KB) ..." >"${LOG_FILE}.new"
            tail -c 10000 "$LOG_FILE" >>"${LOG_FILE}.new"
            mv "${LOG_FILE}.new" "$LOG_FILE"
          fi
          exit "$EXIT"

      - name: Terraform format
        id: format
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: |
          set -o pipefail
          mkdir -p "$GITHUB_WORKSPACE/.ci-logs"
          LOG_FILE="$GITHUB_WORKSPACE/.ci-logs/format.log"
          # -diff lists needed edits; filenames appear in the diff / list output
          terraform fmt -check -diff -recursive 2>&1 | tee "$LOG_FILE"
          EXIT=${PIPESTATUS[0]}
          if [ "$(stat -c%s "$LOG_FILE")" -gt 12000 ]; then
            printf '%s\n' "... (log truncated, showing last 10KB) ..." >"${LOG_FILE}.new"
            tail -c 10000 "$LOG_FILE" >>"${LOG_FILE}.new"
            mv "${LOG_FILE}.new" "$LOG_FILE"
          fi
          exit "$EXIT"

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint
        id: tflint
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: |
          set -o pipefail
          mkdir -p "$GITHUB_WORKSPACE/.ci-logs"
          LOG_FILE="$GITHUB_WORKSPACE/.ci-logs/tflint.log"
          tflint --init
          tflint --config "${GITHUB_WORKSPACE}/resources/tflint.hcl" --recursive 2>&1 | tee "$LOG_FILE"
          EXIT=${PIPESTATUS[0]}
          if [ "$(stat -c%s "$LOG_FILE")" -gt 12000 ]; then
            printf '%s\n' "... (log truncated, showing last 10KB) ..." >"${LOG_FILE}.new"
            tail -c 10000 "$LOG_FILE" >>"${LOG_FILE}.new"
            mv "${LOG_FILE}.new" "$LOG_FILE"
          fi
          exit "$EXIT"

      - name: Terraform validate
        id: validate
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: |
          set -o pipefail
          mkdir -p "$GITHUB_WORKSPACE/.ci-logs"
          LOG_FILE="$GITHUB_WORKSPACE/.ci-logs/validate.log"
          terraform validate 2>&1 | tee "$LOG_FILE"
          EXIT=${PIPESTATUS[0]}
          if [ "$(stat -c%s "$LOG_FILE")" -gt 12000 ]; then
            printf '%s\n' "... (log truncated, showing last 10KB) ..." >"${LOG_FILE}.new"
            tail -c 10000 "$LOG_FILE" >>"${LOG_FILE}.new"
            mv "${LOG_FILE}.new" "$LOG_FILE"
          fi
          exit "$EXIT"

      - name: Update README.md with terraform-docs
        id: tfdocs
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        working-directory: .
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/.ci-logs"
          LOG_FILE="$GITHUB_WORKSPACE/.ci-logs/tfdocs.log"
          TD_VER="0.19.0"
          curl -sSLo /tmp/td.tgz "https://github.com/terraform-docs/terraform-docs/releases/download/v${TD_VER}/terraform-docs-v${TD_VER}-linux-amd64.tar.gz"
          tar -xzf /tmp/td.tgz -C /tmp terraform-docs
          sudo install -m0755 /tmp/terraform-docs /usr/local/bin/terraform-docs
          GEN=/tmp/tf-docs-README.md
          set +e
          set -o pipefail
          terraform-docs markdown table terraform --config resources/.terraform-docs.yml 2>&1 | tee "$LOG_FILE" > "$GEN"
          TD_EXIT=${PIPESTATUS[0]}
          set -e
          if [ "$TD_EXIT" -ne 0 ]; then
            exit "$TD_EXIT"
          fi
          ROOT_README="${GITHUB_WORKSPACE}/README.md"
          [ -f "$ROOT_README" ] || : > "$ROOT_README"
          tr -d '\r' < "$ROOT_README" > /tmp/readme.lf
          tr -d '\r' < "$GEN" > /tmp/gen.lf
          if diff -q /tmp/readme.lf /tmp/gen.lf >/dev/null; then
            echo "README.md already up to date." | tee -a "$LOG_FILE"
            exit 0
          fi
          cp "$GEN" "$ROOT_README"
          echo "README.md updated from terraform-docs output." | tee -a "$LOG_FILE"
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            if git diff --cached --quiet; then
              echo "No README.md changes to commit." | tee -a "$LOG_FILE"
              exit 0
            fi
            git commit -m "docs: update terraform docs"
            git push | tee -a "$LOG_FILE"
          fi

      - name: Terraform plan
        id: plan
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          set -o pipefail
          mkdir -p "$GITHUB_WORKSPACE/.ci-logs"
          LOG_FILE="$GITHUB_WORKSPACE/.ci-logs/plan.log"
          terraform plan -no-color -input=false 2>&1 | tee "$LOG_FILE"
          EXIT=${PIPESTATUS[0]}
          if [ "$(stat -c%s "$LOG_FILE")" -gt 12000 ]; then
            printf '%s\n' "... (log truncated, showing last 10KB) ..." >"${LOG_FILE}.new"
            tail -c 10000 "$LOG_FILE" >>"${LOG_FILE}.new"
            mv "${LOG_FILE}.new" "$LOG_FILE"
          fi
          exit "$EXIT"

      - uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        env:
          DETECT_SECRETS_OUTCOME: ${{ steps.detect_secrets.outcome }}
          INIT_OUTCOME: ${{ steps.init.outcome }}
          FORMAT_OUTCOME: ${{ steps.format.outcome }}
          TFLINT_OUTCOME: ${{ steps.tflint.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
          TFDOCS_OUTCOME: ${{ steps.tfdocs.outcome }}
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const marker = '<!-- gh-actions-terraform-ci-report -->';

            function readLog(name) {
              const p = path.join(process.env.GITHUB_WORKSPACE, '.ci-logs', `${name}.log`);
              try {
                const text = fs.readFileSync(p, 'utf8');
                return text.trim().length ? text : '_Log file was empty._';
              } catch (e) {
                return `_No log file (step may have been skipped or not run yet): \`${p}\`._`;
              }
            }

            function escFence(s) {
              // Break accidental ``` sequences so they do not terminate the markdown fence.
              return String(s || '_No output captured._').replace(/```/g, '`\u200b``');
            }

            function section(title, outcome, log) {
              const icon =
                outcome === 'success'
                  ? '✅'
                  : outcome === 'failure'
                    ? '❌'
                    : outcome === 'skipped'
                      ? '⏭️'
                      : '❔';
              const reason =
                outcome === 'failure'
                  ? 'This step failed; see output below for the Terraform message.'
                  : outcome === 'skipped'
                    ? 'This step did not run for this event.'
                    : 'Completed without errors (exit code 0).';
              return [
                `### ${icon} ${title}`,
                '',
                `**Result:** \`${outcome}\` — ${reason}`,
                '',
                '<details><summary>Command output</summary>',
                '',
                '```text',
                escFence(log),
                '```',
                '',
                '</details>',
              ].join('\n');
            }

            const outcomes = [
              process.env.DETECT_SECRETS_OUTCOME,
              process.env.INIT_OUTCOME,
              process.env.FORMAT_OUTCOME,
              process.env.TFLINT_OUTCOME,
              process.env.VALIDATE_OUTCOME,
              process.env.PLAN_OUTCOME,
            ];
            const summaryLine = outcomes.some((o) => o === 'failure')
              ? '**Overall:** at least one check failed. Fix the issues below before merging.'
              : '**Overall:** all executed checks passed.';

            const body = [
              marker,
              '## Terraform CI report',
              '',
              summaryLine,
              '',
              section('Detect secrets', process.env.DETECT_SECRETS_OUTCOME, readLog('detect-secrets')),
              '',
              section('Terraform init', process.env.INIT_OUTCOME, readLog('init')),
              '',
              section('Terraform format (`fmt -check -diff`)', process.env.FORMAT_OUTCOME, readLog('format')),
              '',
              section('TFLint', process.env.TFLINT_OUTCOME, readLog('tflint')),
              '',
              section('Terraform validate', process.env.VALIDATE_OUTCOME, readLog('validate')),
              '',
              section('terraform-docs (README.md update, non-blocking)', process.env.TFDOCS_OUTCOME, readLog('tfdocs')),
              '',
              section('Terraform plan', process.env.PLAN_OUTCOME, readLog('plan')),
              '',
              `*Workflow: \`${process.env.GITHUB_RUN_ID}\` · Actor: @${process.env.GITHUB_ACTOR}*`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find((c) => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail PR if any Terraform check failed
        if: >-
          always() &&
          github.event_name == 'pull_request' &&
          (steps.detect_secrets.outcome == 'failure' ||
           steps.init.outcome == 'failure' ||
           steps.format.outcome == 'failure' ||
           steps.tflint.outcome == 'failure' ||
           steps.validate.outcome == 'failure' ||
           steps.plan.outcome == 'failure')
        run: exit 1

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false

  pr-merge-gate:
    name: terraform-merge-gate
    if: always() && github.event_name == 'pull_request'
    needs: [terraform]
    runs-on: ubuntu-latest
    steps:
      - name: Require Terraform workflow success
        env:
          TERRAFORM_RESULT: ${{ needs.terraform.result }}
        run: |
          echo "Terraform job result: $TERRAFORM_RESULT"
          if [ "$TERRAFORM_RESULT" != "success" ]; then
            echo "::error::Terraform checks did not succeed (job result: $TERRAFORM_RESULT). Fix failures or wait for a green run before merging to main."
            exit 1
          fi
          echo "Terraform checks succeeded; OK to merge (subject to branch protection rules)."
